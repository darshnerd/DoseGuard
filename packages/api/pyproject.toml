[project]
name = "doseguard-api"
version = "0.2.0"
description = "doseguard API - medictaion scanner"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.136.3",
    "uvicorn[standard]>=0.49.0",
    "pydantic-settings>=2.14.1",
    "httpx2>=2.3.0",
    "sqlmodel>=0.0.38",
    "paddleocr>=3.6.0",
    "paddlepaddle>=3.3.1",
    "opencv-python-headless>=4.13.0.92",
    "python-multipart>=0.0.32",
    "pyjwt>=2.13.0",
    "bcrypt>=5.0.0",
    "slowapi>=0.1.9",
    "email-validator>=2.3.0",
    "rapidfuzz>=3.14.5"
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "httpx>=0.28.0",
    "ruff>=0.15.16",
    "respx>=0.23.1",
    "pytest-asyncio>=0.23.1"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"