[project]
name = "doseguard-api"
version = "0.1.0"
description = "doseguard API - medictaion scanner"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.136.3",
    "uvicorn[standard]>=0.49.0",
    "pydantic-settings>=2.14.1",
    "httpx2>=2.3.0",
    "sqlmodel>=0.0.38",
    "pytesseract>=0.3.13",
    "opencv-python-headless>=4.13.0.92",
    "python-multipart>=0.0.32"

]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "httpx>=0.28.0",
    "ruff>=0.15.16",
    "respx>=1.4.0",
    "pytest-asyncio>=0.23.1"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"